# Build and push the XTTS API image (no local Docker required on your PC).
#
# Required repo secrets:
#   DOCKERHUB_USERNAME
#   DOCKERHUB_TOKEN    (Docker Hub → Account Settings → Security → New Access Token)
#
# Optional (repo variable, not a secret):
#   DOCKERHUB_IMAGE    full image name without tag, e.g. "myuser/nakama-xtts-api"
#                      Settings → Secrets and variables → Actions → Variables
#                      (defaults to DOCKERHUB_USERNAME/nakama-xtts-api)

name: Build and push XTTS API image

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - "docker/xtts-api/**"
      - ".github/workflows/docker-xtts-api.yml"

env:
  REGISTRY: docker.io

jobs:
  build-push:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    permissions:
      contents: read

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL || true
          df -h

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Check Docker Hub secrets
        env:
          DH_USER: ${{ secrets.DOCKERHUB_USERNAME }}
          DH_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [ -z "$DH_USER" ]; then
            echo "::error::Missing or empty secret DOCKERHUB_USERNAME (repo Settings → Secrets and variables → Actions)."
            exit 1
          fi
          if [ -z "$DH_TOKEN" ]; then
            echo "::error::Missing or empty secret DOCKERHUB_TOKEN."
            exit 1
          fi

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Image name
        id: image
        env:
          DOCKERHUB_IMAGE_VAR: ${{ vars.DOCKERHUB_IMAGE }}
        run: |
          if [ -n "$DOCKERHUB_IMAGE_VAR" ]; then
            echo "name=$DOCKERHUB_IMAGE_VAR" >> "$GITHUB_OUTPUT"
          else
            echo "name=${{ secrets.DOCKERHUB_USERNAME }}/nakama-xtts-api" >> "$GITHUB_OUTPUT"
          fi

      - name: Docker metadata (tags)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./docker/xtts-api
          file: ./docker/xtts-api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
